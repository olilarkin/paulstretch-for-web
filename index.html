<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Paulstretch For Web — Extreme audio time-stretching</title>
    <meta
      name="description"
      content="The classic Paulstretch extreme time-stretcher, running entirely in your browser. No install, works offline — add it to your home screen."
    />
    <link rel="canonical" href="https://olilarkin.github.io/paulstretch-for-web/" />

    <!-- Social share card (Open Graph — Facebook, iMessage, Slack, Discord…).
         URLs must be absolute; crawlers don't run JS or resolve Vite's base. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Paulstretch For Web" />
    <meta property="og:title" content="Paulstretch For Web — Extreme audio time-stretching" />
    <meta
      property="og:description"
      content="The classic Paulstretch extreme time-stretcher, running entirely in your browser. No install, works offline."
    />
    <meta property="og:url" content="https://olilarkin.github.io/paulstretch-for-web/" />
    <meta property="og:image" content="https://olilarkin.github.io/paulstretch-for-web/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Paulstretch For Web running on an iPhone" />

    <!-- Twitter/X large-image card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Paulstretch For Web — Extreme audio time-stretching" />
    <meta
      name="twitter:description"
      content="The classic Paulstretch extreme time-stretcher, running entirely in your browser. No install, works offline."
    />
    <meta name="twitter:image" content="https://olilarkin.github.io/paulstretch-for-web/og-image.png" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <link rel="icon" type="image/png" sizes="48x48" href="./favicon-48.png" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />

    <!-- Web app manifest (name, icons, standalone display) -->
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#335577" />

    <!-- iOS "Add to Home Screen": run standalone and label the icon "Paulstretch" -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Paulstretch" />

    <!-- GitHub Pages can't set COOP/COEP; this service worker re-serves
         responses with the headers SharedArrayBuffer requires. No-op when the
         page is already cross-origin-isolated (e.g. local dev). -->
    <script src="./coi-serviceworker.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
